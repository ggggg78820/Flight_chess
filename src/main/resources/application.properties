# ============================================================
# Spring Boot 應用程式設定檔
# 這份檔案裡的每一行 key=value，Spring Boot 啟動時都會自動讀取，
# 用來設定資料庫連線、JPA 行為、MVC 視圖位置等等。
# ============================================================

# 應用程式名稱（會顯示在啟動 log、Actuator 資訊等地方）
spring.application.name=demo

# --- 資料庫連線設定（MySQL）---
# jdbc:mysql://主機:埠號/資料庫名稱?參數
#   useSSL=false              -> 不使用 SSL 連線（本機開發簡化用，正式環境建議開啟）
#   allowPublicKeyRetrieval=true -> 允許用密碼登入時自動取得伺服器的 RSA 公鑰
#   serverTimezone=UTC        -> 指定時區，避免日期時間換算錯誤
spring.datasource.url=jdbc:mysql://localhost:3306/flight_chess?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
# 啟動前必須設定 DB_PASSWORD 環境變數；密碼不再存放於版本控制中。
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate 設定 ---
# ddl-auto=update：程式啟動時，Hibernate 會比對 @Entity 類別跟資料庫現有的表格結構，
#                   自動新增缺少的表格/欄位（但不會刪除既有欄位）。方便開發，正式環境通常改用資料庫遷移工具。
spring.jpa.hibernate.ddl-auto=update
# show-sql=true：把 Hibernate 執行的每一句 SQL 印到 console，方便除錯觀察
spring.jpa.show-sql=true
# format_sql=true：印出來的 SQL 會自動排版，比較好閱讀
spring.jpa.properties.hibernate.format_sql=true
